version: "3.9"

services:
  db:
    image: postgres:15
    container_name: infra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: infrauser
      POSTGRES_PASSWORD: infra123
      POSTGRES_DB: infradb
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: infra-container
    restart: unless-stopped
    environment:
      DB_HOST: infra-db
      DB_NAME: infradb
      DB_USER: infrauser
      DB_PASSWORD: infra123
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: infra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

volumes:
  db-data:
