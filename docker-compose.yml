version: "3.9"

services:
  app:
    build: .
    container_name: infra-container
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: infradb
      DB_USER: infrauser
      DB_PASSWORD: infra123
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: infra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: infrauser
      POSTGRES_PASSWORD: infra123
      POSTGRES_DB: infradb
    volumes:
      - db-data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: infra-nginx
    ports:
      - "80:80"

volumes:
  db-data:
